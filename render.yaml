services:
  - type: web
    name: dela-ryadom
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_BASE_URL
        value: https://dela-ryadom.onrender.com
      - key: FRONTEND_ALLOWED_ORIGIN
        value: https://dela-ryadom.onrender.com
      - key: COOKIE_SECRET
        generateValue: true
      - key: COOKIE_SAME_SITE
        value: None
      - key: COOKIE_SECURE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: dela-ryadom-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: PAYMENT_PROVIDER
        value: mock
      - key: PAYMENT_MOCK_AUTO_CONFIRM
        value: "false"
      - key: ESIA_CLIENT_ID
        value: ""
      - key: ESIA_CLIENT_SECRET
        value: ""
      - key: ESIA_REDIRECT_URI
        value: https://dela-ryadom.onrender.com/api/auth/esia/callback

databases:
  - name: dela-ryadom-db
    plan: free
    databaseName: dela_ryadom
    user: dela_ryadom
