services:
  - type: web
    name: dela-ryadom
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FRONTEND_ALLOWED_ORIGIN
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: COOKIE_SAME_SITE
        value: None
      - key: COOKIE_SECURE
        value: "true"
      - key: PAYMENT_PROVIDER
        value: mock
      - key: PAYMENT_MOCK_AUTO_CONFIRM
        value: "false"
      - key: ESIA_CLIENT_ID
        sync: false
      - key: ESIA_CLIENT_SECRET
        sync: false
      - key: ESIA_REDIRECT_URI
        sync: false
